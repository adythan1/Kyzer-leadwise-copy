name: leadwise-lms
region: fra
static_sites:
  - name: leadwise-web
    github:
      repo: Rhytah/personal
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: npm ci && npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    environment_slug: node-js
    envs:
      - key: VITE_SUPABASE_URL
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_SUPABASE_ANON_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: /api
      - key: VITE_APP_URL
        scope: BUILD_TIME
        value: https://myleadwiseacademy.com
      - key: NODE_VERSION
        scope: BUILD_TIME
        value: "20"
services:
  - name: leadwise-api
    github:
      repo: Rhytah/personal
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    build_command: npm ci
    run_command: npm run start:api
    http_port: 8080
    routes:
      - path: /api
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: NODE_VERSION
        scope: BUILD_TIME
        value: "20"
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: https://myleadwiseacademy.com
      - key: SUPABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_ANON_KEY
        scope: RUN_TIME
        type: SECRET
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
